name: Build and Upload Release APK

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build_release.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK for arm64-v8a
        run: flutter build apk --target-platform android-arm64 --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk superhut-v1.2.1-m3-arm64-v8a.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.2.1-m3"
          files: superhut-v1.2.1-m3-arm64-v8a.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}